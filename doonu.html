<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบ Python M3U Master Parser - Full Episodes</title>
    <style>
        :root { --gold: #ffeb3b; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .status-box { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-left: 6px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid #333; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-title { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 10px; min-height: 45px; }
        .ep-count { font-size: 13px; color: #aaa; margin-bottom: 10px; }
        button { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover { background: #fff; transform: translateY(-2px); }
        pre { background: #000; color: #00ff41; padding: 12px; font-size: 11px; overflow-x: auto; max-height: 200px; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--gold);">ดึงข้อมูอ API Full Playlist M3U</h1>
    
    <div class="status-box">
        <div id="loader" style="font-size: 18px; font-weight: bold;">🚀 เตรียมพร้อมระบบ...</div>
        <div id="stats" style="margin-top: 8px; color: #bbb;"></div>
    </div>

    <div id="output" class="grid"></div>
</div>

<script>
const CONFIG = {
    categoryUrl: 'https://kubhd24.net/category/thai-dubbed-series/',
    proxy: '/api/proxy-k24hd?url='
};

async function getHTML(url) {
    try {
        const res = await fetch(CONFIG.proxy + encodeURIComponent(url));
        return res.ok ? await res.text() : null;
    } catch (e) { return null; }
}

async function getJSON(url) {
    try {
        const res = await fetch(CONFIG.proxy + encodeURIComponent(url));
        return res.ok ? await res.json() : null;
    } catch (e) { return null; }
}

// 1. ดึง Stream URL จาก Post ID
async function getStream(postId) {
    const apiUrl = `https://kubhd24.net/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`;
    const json = await getJSON(apiUrl);
    if (!json?.success) return null;

    // หาลิงก์จาก data-src (เลือกอันที่เป็น 'หลัก')
    const match = json.player.match(/data-src="([^"]+)"/);
    if (!match) return null;

    const embedUrl = match[1];
    const videoId = embedUrl.split('/').pop();
    return `https://media.vdohls.com/${videoId}/playlist.m3u8`;
}

// 2. ดึงข้อมูลซีรีส์และ "ทุกตอน"
async function parseFullSeries(id) {
    const html = await getHTML(`https://kubhd24.net/series/${id}/`);
    if (!html) return null;

    const doc = new DOMParser().parseFromString(html, "text/html");
    const title = doc.querySelector("h1")?.textContent.trim() || id;
    const poster = doc.querySelector("img.wp-post-image")?.getAttribute("data-src") || doc.querySelector("img.wp-post-image")?.src;
    
    // ค้นหาปุ่มตอนทั้งหมด (คลาส .ep ในส่วน #eplist)
    const epButtons = doc.querySelectorAll("#eplist button.ep");
    const episodes = [];

    // วนลูปดึงข้อมูลทุกตอน
    for (const btn of epButtons) {
        const epTitle = btn.textContent.trim();
        const streamUrl = await getStream(btn.id);
        if (streamUrl) {
            episodes.push({ title: epTitle, url: streamUrl });
        }
    }

    return { id, title, poster, episodes };
}

// 3. ฟังก์ชันเริ่มต้น
async function init() {
    const loader = document.getElementById("loader");
    const stats = document.getElementById("stats");
    const output = document.getElementById("output");

    loader.textContent = "🔍 กำลังกวาดรายชื่อซีรีส์จากหน้า Category...";
    const categoryHtml = await getHTML(CONFIG.categoryUrl);
    if (!categoryHtml) {
        loader.textContent = "❌ Error: ไม่สามารถดึงข้อมูลได้ (Check Proxy)";
        return;
    }

    // ใช้ Regex ดึง ID ซีรีส์
    const regex = /href="https:\/\/kubhd24\.net\/series\/([^"\/]+)\//g;
    const ids = Array.from(new Set([...categoryHtml.matchAll(regex)].map(m => m[1]))).filter(i => i !== 'series');

    stats.textContent = `พบซีรีส์ทั้งหมด ${ids.length} เรื่อง ในหน้านี้`;

    for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        loader.textContent = `⏳ กำลังโหลด (${i+1}/${ids.length}): ${id}`;
        
        const data = await parseFullSeries(id);
        if (data && data.episodes.length > 0) {
            // สร้าง M3U แบบรวมทุกตอน
            let m3u = "#EXTM3U\n";
            data.episodes.forEach(ep => {
                m3u += `#EXTINF:-1 tvg-logo="${data.poster}" group-title="${data.title}", ${data.title} - ${ep.title}\n`;
                m3u += `${ep.url}\n`;
            });

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${data.poster}">
                <div class="card-body">
                    <div class="card-title">${data.title}</div>
                    <div class="ep-count">พบทั้งหมด ${data.episodes.length} ตอน</div>
                    <button onclick="toggleM3U(this)">📂 ดู Playlist M3U8 (${data.episodes.length} ตอน)</button>
                    <pre>${m3u}</pre>
                </div>
            `;
            output.appendChild(card);
        }
    }
    loader.textContent = "✅ ดึงข้อมูลทุกตอนของทุกเรื่องเสร็จสมบูรณ์!";
}

function toggleM3U(btn) {
    const pre = btn.nextElementSibling;
    pre.style.display = (pre.style.display === 'block') ? 'none' : 'block';
    btn.textContent = (pre.style.display === 'block') ? '✖ ปิดหน้าต่าง' : `📂 ดู Playlist M3U8`;
}

init();
</script>
</body>
</html>
