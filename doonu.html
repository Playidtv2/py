<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doo-Nang Auto Catalog & Parser</title>
  <style>
    :root { --primary: #5FBE00; --dark: #1a1a1a; --gray: #333; --blue: #0078d7; }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
    
    /* Sidebar Catalog */
    .sidebar { background: #1e1e1e; padding: 20px; border-radius: 12px; height: 90vh; overflow-y: auto; border: 1px solid var(--gray); }
    .catalog-item { display: flex; gap: 10px; padding: 10px; margin-bottom: 10px; background: #252525; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .catalog-item:hover { background: #333; border-color: var(--primary); }
    .catalog-item img { width: 60px; height: 85px; object-fit: cover; border-radius: 4px; }
    .catalog-info { font-size: 13px; overflow: hidden; }
    .catalog-title { font-weight: bold; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Main Content */
    .main-content { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid var(--gray); }
    h1, h2 { margin-top: 0; color: var(--primary); }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--gray); background: #222; color: #fff; }
    button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-blue { background: var(--blue); color: #fff; }
    
    pre { background: #000; color: #5FBE00; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; max-height: 350px; border: 1px solid var(--gray); }
    .loader { display: none; color: var(--primary); text-align: center; margin: 10px 0; font-weight: bold; }
    .status-bar { padding: 10px; background: #252525; border-radius: 6px; margin-bottom: 15px; font-size: 14px; border-left: 4px solid var(--blue); }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h3>🎬 รายการล่าสุด</h3>
    <button onclick="loadCatalog()" style="width:100%; margin-bottom:15px;" class="btn-blue">🔄 รีเฟรชรายการ</button>
    <div id="catalogList">โหลดรายการ...</div>
  </div>

  <div class="main-content">
    <h1>Doo-Nang Parser Pro</h1>
    
    <div class="controls">
      <input id="showId" type="number" placeholder="ระบุ Show ID">
      <button onclick="runParser()" class="btn-primary">ดึงข้อมูล ID นี้</button>
    </div>

    <div id="loader" class="loader">⏳ กำลังวิเคราะห์ข้อมูล...</div>

    <div id="displayArea" style="display:none;">
      <div class="status-bar" id="currentInfo"></div>
      <button id="dlBtn" class="btn-blue">📥 ดาวน์โหลด M3U</button>
      
      <h4>M3U Playlist</h4>
      <pre id="m3uOut"></pre>
      
      <h4>JSON Structure</h4>
      <pre id="jsonOut"></pre>
    </div>
  </div>
</div>

<script>
const GQL_URL = "https://api.doo-nang.com/graphql";

// --- 1. ดึงรายการหน้าแรก (Catalog) ---
async function loadCatalog() {
  const query = `query getShows($page: Int, $limit: Int) {
    shows(page: $page, limit: $limit, sort: "releaseDate", order: "desc") {
      docs { id titleTh titleEn posterUrl releaseDate nation }
    }
  }`;

  try {
    const res = await fetch(GQL_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, variables: { page: 1, limit: 30 } })
    });
    const result = await res.json();
    const docs = result?.data?.shows?.docs || [];
    
    const listEl = document.getElementById("catalogList");
    listEl.innerHTML = docs.map(item => `
      <div class="catalog-item" onclick="setAndRun(${item.id})">
        <img src="${item.posterUrl}" alt="poster">
        <div class="catalog-info">
          <div class="catalog-title">${item.titleTh}</div>
          <div style="color:#888">${item.titleEn}</div>
          <div style="margin-top:5px">📅 ${item.releaseDate?.substring(0,4) || '-'} | 🌏 ${item.nation}</div>
          <div style="color:var(--blue)">ID: ${item.id}</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById("catalogList").innerHTML = "❌ โหลดล้มเหลว";
  }
}

function setAndRun(id) {
  document.getElementById("showId").value = id;
  runParser();
}

// --- 2. ตัวแยกวิเคราะห์ (Parser Logic) ---
async function runParser() {
  const id = document.getElementById("showId").value;
  if (!id) return;

  const loader = document.getElementById("loader");
  const display = document.getElementById("displayArea");
  
  loader.style.display = "block";
  display.style.display = "none";

  try {
    const data = await fetchFullData(id);
    const m3u = generateM3U(data);

    document.getElementById("currentInfo").innerHTML = `<b>กำลังแสดง:</b> ${data.name} (${data.info.year})`;
    document.getElementById("m3uOut").textContent = m3u;
    document.getElementById("jsonOut").textContent = JSON.stringify(data, null, 2);
    
    const dlBtn = document.getElementById("dlBtn");
    dlBtn.onclick = () => {
      const blob = new Blob([m3u], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Playlist_${id}.m3u`;
      a.click();
    };

    display.style.display = "block";
  } catch (err) {
    alert("เกิดข้อผิดพลาด: " + err.message);
  } finally {
    loader.style.display = "none";
  }
}

async function fetchFullData(showId) {
  const query = `query getShow($id: Int!) {
    show(id: $id) {
      id titleTh titleEn posterUrl synopsisTh releaseDate
      episodes { 
        seasonNo episodeNo titleTh video { transcodeUuid cdnHostname }
      }
    }
  }`;

  const res = await fetch(GQL_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, variables: { id: parseInt(showId) } })
  });
  
  const result = await res.json();
  const show = result?.data?.show;
  if (!show) throw new Error("ไม่พบ ID นี้");

  return {
    id: show.id,
    name: show.titleTh || show.titleEn,
    info: { poster: show.posterUrl, year: show.releaseDate?.substring(0,4) },
    seasons: groupEpisodes(show.episodes || [], show.titleTh, show.posterUrl)
  };
}

function groupEpisodes(eps, mainTitle, poster) {
  const groups = {};
  eps.forEach(ep => {
    const s = ep.seasonNo || 1;
    if (!groups[s]) groups[s] = { season: s, episodes: [] };
    groups[s].episodes.push({
      episode: ep.episodeNo,
      title: ep.titleTh || `ตอนที่ ${ep.episodeNo}`,
      video: ep.video ? `https://api.doo-nang.com/video/${ep.video.transcodeUuid}/playlist.m3u8` : null
    });
  });
  return Object.values(groups);
}

function generateM3U(data) {
  let m3u = "#EXTM3U\n";
  data.seasons.forEach(s => {
    s.episodes.sort((a,b) => a.episode - b.episode).forEach(ep => {
      if (ep.video) {
        m3u += `#EXTINF:-1 type="series" group-title="${data.name}" tvg-logo="${data.info.poster}" tvg-season="${s.season}" tvg-episode="${ep.episode}", ${data.name} S${s.season} E${ep.episode}\n${ep.video}\n`;
      }
    });
  });
  return m3u;
}

// โหลด Catalog ครั้งแรก
loadCatalog();
</script>
</body>
</html>
