<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Kub24HD Full Playlist Parser</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .status-box { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #ffeb3b; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: scale(1.02); border-color: #ffeb3b; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; height: 40px; overflow: hidden; }
        button { background: #ffeb3b; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        pre { background: #000; color: #0f0; padding: 10px; font-size: 11px; overflow-x: auto; max-height: 150px; }
        .m3u-area { display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kub24HD Category Parser</h1>
    
    <div class="status-box">
        <div id="loader">⏳ กำลังเตรียมการ...</div>
        <div id="stats" style="font-size: 14px; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="output" class="grid"></div>
</div>

<script>
const CONFIG = {
    categoryUrl: 'https://kubhd24.net/category/thai-dubbed-series/',
    proxy: '/api/proxy-k24hd?url='
};

// ฟังก์ชันดึง HTML ผ่าน Proxy
async function getHTML(url) {
    try {
        const res = await fetch(CONFIG.proxy + encodeURIComponent(url));
        if (!res.ok) return null;
        return await res.text();
    } catch (e) { return null; }
}

// 1. ค้นหา ID หนังทั้งหมดจากหน้า Category โดยใช้ Regex (แม่นยำที่สุด)
function extractSeriesIds(html) {
    // ค้นหา URL ที่เป็น /series/xxx/ หรือ /series/xxx
    const regex = /href="https:\/\/kubhd24\.net\/series\/([^"\/]+)\//g;
    const ids = new Set();
    let match;
    
    while ((match = regex.exec(html)) !== null) {
        if (match[1] !== 'series') { // กันตัวหลอก
            ids.add(match[1]);
        }
    }
    return Array.from(ids);
}

// 2. ดึงข้อมูลตัวเล่น (M3U8)
async function getStream(postId) {
    const apiUrl = `https://kubhd24.net/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`;
    const res = await fetch(CONFIG.proxy + encodeURIComponent(apiUrl));
    const json = await res.json();
    if (!json.success) return null;

    const embedMatch = json.player.match(/data-src="([^"]+)"/);
    if (!embedMatch) return null;

    const videoId = embedMatch[1].split('/').pop();
    return `https://media.vdohls.com/${videoId}/playlist.m3u8`;
}

// 3. ประมวลผลหนังแต่ละเรื่อง
async function parseSeries(id) {
    const html = await getHTML(`https://kubhd24.net/series/${id}/`);
    if (!html) return null;

    const doc = new DOMParser().parseFromString(html, "text/html");
    const title = doc.querySelector("h1")?.textContent.trim() || id;
    const poster = doc.querySelector("img.wp-post-image")?.getAttribute("data-src") || doc.querySelector("img.wp-post-image")?.src;
    
    // ดึง ID ของตอนแรก (Post ID สำหรับ API)
    const firstEpBtn = doc.querySelector("button.ep");
    if (!firstEpBtn) return null;

    const streamUrl = await getStream(firstEpBtn.id);
    
    return { id, title, poster, streamUrl };
}

async function init() {
    const loader = document.getElementById("loader");
    const stats = document.getElementById("stats");
    const output = document.getElementById("output");

    loader.textContent = "🔍 กำลังสแกนหาหนังในหมวดหมู่...";
    const categoryHtml = await getHTML(CONFIG.categoryUrl);
    
    if (!categoryHtml) {
        loader.textContent = "❌ ไม่สามารถติดต่อ Proxy ได้ หรือ URL ผิด";
        return;
    }

    const ids = extractSeriesIds(categoryHtml);
    stats.textContent = `พบซีรีส์ทั้งหมด ${ids.length} เรื่อง`;

    if (ids.length === 0) {
        loader.textContent = "❓ ไม่พบลิงก์ซีรีส์ (อาจต้องเช็ค Regex หรือ HTML)";
        return;
    }

    loader.textContent = "🚀 กำลังดึง Playlist ของแต่ละเรื่อง...";

    for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        loader.textContent = `⏳ กำลังประมวลผล (${i+1}/${ids.length}): ${id}`;
        
        const data = await parseSeries(id);
        if (data && data.streamUrl) {
            const m3u = `#EXTM3U\n#EXTINF:-1 tvg-logo="${data.poster}", ${data.title}\n${data.streamUrl}`;
            
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${data.poster}">
                <div class="card-body">
                    <div class="card-title">${data.title}</div>
                    <button onclick="this.nextElementSibling.style.display='block'">ดู M3U</button>
                    <div class="m3u-area">
                        <pre>${m3u}</pre>
                    </div>
                </div>
            `;
            output.appendChild(card);
        }
    }
    loader.textContent = "✅ ดึงข้อมูลสำเร็จครบทุกเรื่อง!";
}

init();
</script>
</body>
</html>
